		<!-- PWA launch helpers (run BEFORE SvelteKit boots) ───────────────────
		     1. Tag <html> if running in installed-app (standalone) mode — the
		        splash and any other PWA-only styles key off this.
		     2. Restore the listener's last visited path so tapping the home-
		        screen icon resumes where they left off instead of always
		        dropping them at "/". 24h freshness window; one-shot redirect
		        uses location.replace so it doesn't pollute history. -->
		<script>
			(function () {
				try {
					var standalone =
						window.matchMedia('(display-mode: standalone)').matches ||
						window.navigator.standalone === true;
					if (standalone) {
						document.documentElement.classList.add('pwa-standalone');
						// Failsafe: if hydration never fires pwa-ready (JS bundle
						// failed to load, SW offline with no cache, etc.) don't
						// trap the user behind the splash forever — force it off
						// after 6s so at least something renders.
						setTimeout(function () {
							document.documentElement.classList.add('pwa-ready');
						}, 6000);
					}

					// Path restoration — only inside the installed app, only when
					// landing on the bare "/" root, and only for recent sessions.
					if (
						standalone &&
						window.location.pathname === '/' &&
						!window.location.search &&
						!window.location.hash
					) {
						var saved = localStorage.getItem('missionnaire:last-path');
						var savedAt = parseInt(localStorage.getItem('missionnaire:last-path-at') || '0', 10);
						var FRESH_MS = 24 * 60 * 60 * 1000;
						if (saved && saved !== '/' && Date.now() - savedAt < FRESH_MS) {
							// Clear first so a failed redirect doesn't loop forever.
							localStorage.removeItem('missionnaire:last-path');
							window.location.replace(saved);
						}
					}
				} catch (e) {
					/* localStorage unavailable (private mode) — ignore */
				}
			})();
		</script>

		<!-- ── Pure-HTML/CSS splash + anti-flash background ─────────────────
		     Paints the warm cream background and a branded splash the
		     instant the document is parsed — before any JS runs, before
		     SvelteKit hydrates, before the service worker takes control.
		     This is the core fix for the white-screen-on-first-load gap.
		     The splash is hidden via the `pwa-ready` class added by
		     +layout.svelte once Svelte mounts. No JavaScript involved
		     in the rendering path. -->
		<style>
			/* Lock the page background to the app cream so there is no
			   white flash before app.css loads or before hydration. */
			html, body {
				background-color: #FAF8F3;
				margin: 0;
				min-height: 100%;
			}

			.app-splash {
				position: fixed;
				inset: 0;
				z-index: 99999;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 28px;
				background: #FAF8F3;
				pointer-events: none;
				/* Default fade — applied once <html> gets the
				   `pwa-ready` class from +layout.svelte (post-hydration). */
				opacity: 1;
				visibility: visible;
				transition: opacity 0.3s ease-out, visibility 0s linear 0.3s;
			}
			.pwa-ready .app-splash {
				opacity: 0;
				visibility: hidden;
			}
			/* In installed PWA mode, the splash also serves as a native-
			   feel launch screen, so its branding is unchanged here. */
			.app-splash__logo {
				width: 136px;
				height: auto;
				animation: app-splash-enter 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
			}
			.app-splash__spinner {
				width: 26px;
				height: 26px;
				border-radius: 50%;
				border: 2px solid rgba(255, 136, 12, 0.2);
				border-top-color: #ff880c;
				animation: app-splash-spin 0.8s linear infinite;
			}
			.app-splash__brand {
				font-family: 'Cormorant Garamond', Georgia, serif;
				font-size: 11px;
				font-weight: 600;
				letter-spacing: 0.35em;
				text-transform: uppercase;
				color: rgba(139, 115, 85, 0.6);
			}
			@keyframes app-splash-enter {
				from { opacity: 0; transform: translateY(10px) scale(0.96); }
				to   { opacity: 1; transform: none; }
			}
			@keyframes app-splash-spin {
				to { transform: rotate(360deg); }
			}
			/* Respect reduced-motion users — keep the splash static. */
			@media (prefers-reduced-motion: reduce) {
				.app-splash,
				.app-splash__logo,
				.app-splash__spinner {
					animation: none;
					transition: none;
				}
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="scrollbar-custom">
		<div class="app-splash" aria-hidden="true">
			<picture>
				<source srcset="/icons/logo.webp" type="image/webp" />
				<img class="app-splash__logo" src="/icons/logo.png" alt="" width="150" height="64" />
			</picture>
			<div class="app-splash__spinner" aria-hidden="true"></div>
			<span class="app-splash__brand">Missionnaire</span>
		</div>
		<div class="app-container">%sveltekit.body%</div>
	</body>
