app = "missionnaire-streaming-app"
primary_region = "jnb"

[deploy]
  strategy = "immediate"

[build]
  dockerfile = "Dockerfile"

[env]
  RTMP_PATH = "live"
  AUDIO_MOUNT = "radio.mp3"
  AUDIO_BITRATE = "128k"
  INPUT_PROTOCOL = "rtsp"

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "30s"

[[services]]
  internal_port = 1935
  protocol = "tcp"

  [[services.ports]]
    port = 1935

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "30s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
