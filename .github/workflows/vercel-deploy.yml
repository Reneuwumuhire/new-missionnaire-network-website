name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  deploy-website:
    name: Deploy website
    runs-on: ubuntu-latest
    env:
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEBSITE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required secrets
        run: |
          : "${VERCEL_TOKEN:?VERCEL_TOKEN secret is missing}"
          : "${VERCEL_ORG_ID:?VERCEL_ORG_ID secret is missing}"
          : "${VERCEL_PROJECT_ID:?VERCEL_PROJECT_ID_WEBSITE secret is missing}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production

      - name: Build project
        run: vercel build --prod

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod

  deploy-admin:
    name: Deploy admin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./admin
    env:
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required secrets
        run: |
          : "${VERCEL_TOKEN:?VERCEL_TOKEN secret is missing}"
          : "${VERCEL_ORG_ID:?VERCEL_ORG_ID secret is missing}"
          : "${VERCEL_PROJECT_ID:?VERCEL_PROJECT_ID_ADMIN secret is missing}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: admin/pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production

      - name: Build project
        run: vercel build --prod

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod
